[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/submit-lead"
  to = "/.netlify/functions/submit-lead"
  status = 200
  force = true

[[redirects]]
  from = "/guide"
  to = "https://drive.google.com/uc?export=download&id=1lz4F20904MBKyIQUU-4eQpWsoVYy8jfZ"
  status = 301
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "accelerometer=(), camera=(), display-capture=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'sha256-YwkWVQp8lq2f8jNvwjgex+Ew3kgGrMmXfHsPT6d2N/M=' https://www.googletagmanager.com https://www.google-analytics.com https://www.googleadservices.com https://challenges.cloudflare.com; style-src 'self' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' https://img.youtube.com data:; connect-src 'self' https://www.googletagmanager.com https://www.google-analytics.com https://analytics.google.com https://stats.g.doubleclick.net https://challenges.cloudflare.com; frame-src https://www.googletagmanager.com https://challenges.cloudflare.com; object-src 'none'; base-uri 'self'; frame-ancestors 'none'"
